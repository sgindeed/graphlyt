services:
  - type: worker
    name: age-db
    runtime: image
    image: apache/age:latest
    envVars:
      - key: POSTGRES_USER
        value: postgres
      - key: POSTGRES_PASSWORD
        sync: false 
      - key: POSTGRES_DB
        value: knowledge_graph_db

  - type: web
    name: neural-architect-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: DATABASE_URL
        sync: false 
      - key: HF_TOKEN
        sync: false
